	<h3 id="sec1">{{ topL }}<a class="collapse" role="button">The Protagonist</a></h3>
	<div class="chat movelist">
		<p>Every single movie has a huge pacing problem, I think. This is due to a lot of factors that I'll try to recall right now.<br>
		One of the biggest reasons is that they decided to give the protagonist a character arc in each film. Not just one film, but all of them!<br>
		The function of the protagonist in the Persona games is to act as a mirror for other characters to see their own strengths and flaws, letting them grow as people. "Fleshing out" the protagonist is mostly unnecessary, and it's made even worse by being the most developed character in every film.</p>
		<p>Another problem is the specific way that the protagonist's character development is written. It's not developed super well. The only good character arc happens in the first film, and for what it's worth, it's a good arc! In the first movie, the protagonist is introduced as having no care for his life, manifesting as his apathy and lethargy. However, he does fear for the lives of others, and his lack of care for his own life allows him to throw himself in harm's way to help others. This reckless nature puts him in tension with Yukari especially, who would really like him to be more careful since, you know, they're friends.<br> 
		In every other arc, the protagonist comes off as ridiculously suggestible, as they all involve a character telling him something and then he ruminates on it for the entire film. The two examples I recall are:</p>
		<ul>
		<li>• Jin tells SEES about how ending the Dark Hour means going back to their ordinary lives. The rest of the movie deals with this conflict.
		<li>• Pharos telling the protagonist that it's better to never connect with people, because you might lose them. The rest of the movie deals with this conflict.
		</ul>
		<p>The first point is incredibly egregious. After Jin tells SEES about ending the Dark Hour, Makoto becomes really hesitant because he doesn't want the Dark Hour to end. In fact, that specific line is shown in multiple flashbacks. This is despite the fact that over the course of the rest of the film, we learn that Fuuka and Aigis both believe that their existence has no purpose without the Dark Hour. And yet, they never get brought up whenever we see the protagonist hung up about the Dark Hour.</p>

	<h3 id="sec1">{{ topL }}<a class="collapse" role="button">The Other Characters</a></h3>
	<div class="chat movelist">
		<p>Another huge problem that contributes to problems with pacing and emotional resonance is the real lack of focus on character relationships. The heart of the Persona series is character interaction and how bonding with others makes you stronger, lets you see the world from a different perspective, teaches you new things, and so on. The movies totally miss this.</p>
		<p>Barely any time is spent on how characters bounce off of each other, which makes most of the interpersonal conflict feel very out-of-nowhere. The most developed relationship is probably between Ken and Shinjiro. Of course, they had to do this because Shinjiro is integral to Ken's reason for being in SEES and otherwise Shinjiro's death means nothing.</p>
		<p>Next is maybe Junpei and Chidori's relationship. It's more or less fine I guess, but it's still presented in a strange order. Like, I think we see like 10 seconds of Junpei and Chidori in the second film, then the third film starts with SEES fighting Strega and Junpei has been kidnapped by Chidori? And then the rest of the movie builds the relationship partly through present-day moments and partly through flashbacks. As a complete package, it would have been nice if the scenes of Junpei and Chidori being together were shown earlier to make the development feel more organic, but since it's the main focus of that film, it's still fine.</p>
		<p>The next most-developed interpersonal relationship #drama moment is like, Yukari getting mad at the protagonist in the first movie, and that is not well developed at all (even if I like the idea in concept). It feels like it comes out of nowhere when Yukari snaps at him, even though we do see some of the issues between their personalities.</p>
		<p>And in general, there are just a lot of other moments of character conflict that feel weird because we don't get a lot of insight into each character's personality or way of thinking. Also, the lack of focus on other characters means that we get stuff like Fuuka in the second movie talking about how she has no purpose outside of SEES, and as far as I remember that doesn't get resolved on-screen at all. And, as stated earlier, the conflict about ending the Dark Hour in that movie is framed around Jin taunting the protagonist with his formerly ordinary life, rather than the psychological issues other SEES members are going through.</p>
		<p>It just sucks a lot of the life out of the movies, especially when they dedicate time to the protagonist's terribly-written character arcs or battles that aren't super plot-relevant (like the one they open the second movie on, which also kills time with dumb fanservice shots that are even worse because the characters are high schoolers).</p>

	<h3 id="sec3">{{ topL }}<a class="collapse" role="button">The Art</a></h3>
	<div class="chat movelist">
		<p>Even the art is worse than the original game. I don't mean by like the standards of the portraits, I mean the animated cutscenes from the original game are sometimes way better than the equivalent scenes in the movie (granted, there aren't too many animated cutscenes in the game anyways).</p>
		<p>One thing about the movie's art style is that it has a lot of the characteristics of other modern digital anime. Like, it kinda has a really standard color palette, and at different times of day (sunset, nighttime, Dark Hour), the colors look like the same colors but with an overlay put on them. This is something I really dislike about modern anime, because back in the days of cel animation, you had to pick specific colors for different times of day and lighting and such, which made it way more stylized and expressive.</p>
