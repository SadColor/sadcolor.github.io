content:
- id: preface
  title: Preface
  body: 
  - type: p
    body: |-
      Over a couple of days, I played some ROM hacks of the Famicom game **Gimmick**.  
      The original game is pretty tightly designed, I think! Two of the hacks are adjustments of the original, while the other two are supposed to be new games, pretty much. So how good were they to me?  
      I don't know why you'd care, but here's what I think. Oh, and by the way, while I'll label original vs. hack screenshots, you can tell the original apart because when I started playing the ROM hacks, I decided to use an NTSC shader just for fun.  
      It'll probably be annoying that some screenshots look clean and some look like an NTSC analog video feed, so... oops.

- id: easy
  title: Gimmick! Easy Hack
  body: 
  - type: p
    body: |-
      The first hack I played was called **Gimmick! Easy Hack**.  
      As the name suggests, the hack makes changes to reduce **Gimmick**'s difficulty level. Before I talk about what the hack does, I personally think **Gimmick** isn't too hard in the first place?  
      I don't mean to say that the easy hack is pointless, but let me explain a bit.
      
      It took me 8–10 hours to complete my first legitimate good ending run, with a run taking me about 20-30 minutes to complete.  
      I think the challenge level and play time for a single run is reasonable, but arcade-style games where you're supposed to play a short game until you get better aren't everyone's thing, so I can definitely see the appeal of an easy mode hack.  
      The hardest part is actually how finicky the ledges can be. It's not really a problem on normal platforms, but ramps often randomly make you airborne for a frame or two, and conveyor belts can make you fall unexpectedly early. If you try to jump under either of these circumstances, you won't be able to. I actually made a small [ROM hack](https://www.tumblr.com/fukouiro/696149915638824960/) that addresses this issue!  
      With that change alone, I think most of the game becomes a pretty fair challenge. There are some other small things I'd change too, but that's the biggest thing.  
      
      That kind of thing was probably above the coding level of the person who made the hack, since it's just a simple level edit, and there exists a level editor made for the game already.  
      But enough preamble, what kind of changes are made to the game?
  
  - type: subhead
    title: No star jumps required
  
  - type: p
    body: |-
      In Gimmick, you fight enemies by creating a star and throwing it at them.  
      The arc varies based on your momentum and the star is quite bouncy, too.  
      This is one of the coolest things about Gimmick, because by cleverly riding on your star at some points, you can make certain sections much easier, faster, and/or more consistent.  
      Actually, in a normal playthrough of Gimmick, you aren't required to ride on your star at any point.  
      However, in a good ending run, you'll need to use your star to get the stage 1, stage 4, stage 5, and stage 6\* secrets, and optionally a pink health potion in stage 7.  
      In the Easy Hack, these sections have all been adjusted so that you don't need to use your star. I'd probably be fine with the hack removing mandatory star jumps, but I'm a bit sad that even these extra parts have star jumps removed.  
      Having it required to get some of the secrets might make players think more about other spots they can try to star ride! I would've preferred making some of the star jumps easier instead.  
      Here are some screenshots of changed sections.
  
  - type: table
    class: compare_x
    rows:
