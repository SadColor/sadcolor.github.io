  - type: p
    body: |-
      In what is perhaps an oversight, a star jump is still required to escape from the stage 4 secret area.  
      
      A note on the stage 6 secret: As it turns out, you don't need a star jump to do the room with the cannonball spawner.   
      I didn't know this until I saw a comment on the ROM hack, but it appears the intended solution is to push the cannonball spawner through the tube, and then you can ride a cannonball and jump off at the right time to get into the room on the left.  
      You can use a bomb to nudge the spawner into the pipe. If you don't have a bomb, you can either wait for a bomb to come out of it, or you can use a star jump to land up there so you can push it yourself.  
      The level adjustment for the Easy Hack actually renders the bomb solution slightly harder to do, and the non-bomb solution much harder.  
      Of course, since you can just walk off in the Easy Hack, it doesn't really matter, but it's just funny.  
      I guess the hack author also didn't know what you were supposed to do, because if they did know, they would maybe just make a clearer hint in the level design for the intended solution.
      
      Also, there's a second secret room within the secret room of level 2.  
      You can get there by bouncing off the top of the screen here, but the hack added a couple blocks so you can jump up there normally.  
      I don't really mind this change because it's not really clear that there's anything up there in the first place.  
      I only found it one time because I was screwing around. Then again, maybe that's the point?  
      All that's up there is a few items, which you can use to either stock up your supply or push them together to get a couple 1-ups if you want to spend the time.
  
  - type: subhead
    title: Removal of one-block platforms
  
  - type: p
    body: |-
      Yumetaro (the main character of Gimmick!) has more momentum than most video game characters, so it takes a moment for you to come to a stop when you're moving.  
      For some people, it makes it difficult to make jumps properly, so the ROM hack author decided to expand most one block wide platforms to two blocks.  
      It's a pretty consistent change, so I won't show every example, but here are a couple instances where it's noticeable.
  
