- head: Okay, but I wanna make sentences that are longer than one word...
  type: chat
  body: 
  - para: |-
      Japanese is considered a <t-r>topic-comment</t-r> language.
      In other words, you have a topic, and then what follows the topic is making a comment about said topic.
      The basic way to do this is using 「<t-b>topic</t-b>は<t-r>comment</t-r>」, with は being the topic particle.
      <t-y>＊Note that when used as a particle, <t-r>は</t-r> is pronounced like <t-r>わ</t-r>.</t-y>
  frog: t