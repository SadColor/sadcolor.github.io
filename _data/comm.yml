- id: terms
  title: stuff i'll draw
  body: 
  - type: none
    body: |
      - ・ Best at drawing anthropomorphic characters.  
      - ・ No human characters.  
      - ・ Safe-for-work and suggestive content is OK.
      - ・ Characters with intricate details may be simplified.

- id: contact
  title: contact
  body: 
  - type: p
    body: |
      Contact me on one of my [social media accounts](/#sns).  
      I highly encourage having a concept in mind already, preferably with reference images [(even if those images are stick figures)](https://twitter.com/vetyyr/status/1414636926909485057).  
      [Justsketch.me](https://app.justsketch.me/) is also a good free pose doll.

      Payment is done via PayPal invoice.  
      Sketch commissions must be paid for up front; other commissions require payment once a sketch is approved.