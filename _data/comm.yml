      src: prices.png

  - type: subhead
    title: note about extra characters

  - type: p
    body: |
      Things like simple silhouettes or disembodied body parts don't count as an extra character.

  - type: subhead
    title: my character discount

  - type: p
    body: |
      A small discount is applied for commissions featuring [my characters](https://toyhou.se/sadcolor/characters).  
      The discount is **$5** for non-shaded pieces and **$10** for shaded pieces.
      
